<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкатулка интерактивов: Зума</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #2c3e50; font-family: sans-serif; }
        #game-container { position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        #math-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(250, 240, 220, 0.95); padding: 30px; border: 4px solid #b8860b; border-radius: 10px; text-align: center; width: 320px; z-index: 100; }
        .answer-btn { display: block; width: 100%; margin: 10px 0; padding: 12px; background: #d4af37; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .answer-btn:hover { background: #b8860b; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="math-modal">
            <h2>Испытание Сфинкса</h2>
            <p id="question-text" style="font-size: 18px; font-weight: bold;"></p>
            <div id="answers-container"></div>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            physics: { default: 'arcade', arcade: { debug: false } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let frog;
        let currentAmmo; // Шарик, который заряжен в лягушку
        let bullets;
        let enemyBalls;
        let lastFired = 0;
        let isPaused = false;

        // Задачи (формат ОГЭ/базовый)
        const questions = [
            { q: "Найдите корень уравнения: 2x + 8 = 20", options: ["x = 4", "x = 6", "x = 8"], correct: 1 },
            { q: "Вычислите: 7² - 19", options: ["30", "40", "50"], correct: 0 },
            { q: "Площадь квадрата равна 81. Чему равна его сторона?", options: ["8", "9", "18"], correct: 1 }
        ];

        function preload() {
            this.load.image('background', 'bg.png');
            this.load.image('frog', 'frog.png');
            this.load.image('ball', 'ball.png');
        }

        function create() {
            this.add.image(400, 300, 'background').setDisplaySize(800, 600);

            // 1. КООРДИНАТЫ ДОРОЖКИ (x, y, x, y...)
            // Меняйте эти цифры, чтобы подогнать красную линию под ваш фон!
            let pathPoints = [
                0, 100,    // Старт (левый верхний край)
                200, 150,
                400, 100,
                650, 200,
                700, 400,
                500, 500,
                200, 450,
                150, 300   // Конец (около лягушки)
            ];
            
            let path = new Phaser.Curves.Spline(pathPoints);

            // Временная красная линия, чтобы вы видели, где катятся шары
            let graphics = this.add.graphics();
            graphics.lineStyle(4, 0xff0000, 0.6); // Толщина 4, красный цвет, прозрачность 0.6
            path.draw(graphics, 64);

            // 2. Создаем цепочку шариков
            enemyBalls = this.add.group();
            for (let i = 0; i < 15; i++) {
                let follower = this.add.follower(path, 0, 0, 'ball');
                follower.setDisplaySize(45, 45); 
                enemyBalls.add(follower);
                
                follower.startFollow({
                    duration: 15000, 
                    positionOnPath: true,
                    repeat: -1,
                    startAt: i * 0.04 
                });
            }

            bullets = this.physics.add.group({
                classType: Phaser.Physics.Arcade.Image,
                maxSize: 10,
                runChildUpdate: true
            });

            // 3. ЛЯГУШКА И СНАРЯД
            // Сдвигаем лягушку левее (X: 320, Y: 300)
            frog = this.add.image(320, 300, 'frog');
            frog.setDisplaySize(120, 120); 

            // Добавляем "заряженный" шарик в рот лягушке
            currentAmmo = this.add.image(320, 300, 'ball');
            currentAmmo.setDisplaySize(30, 30); // Снаряд чуть меньше летящего
            currentAmmo.setDepth(10); // Чтобы шарик был поверх лягушки

            // 4. Поворот лягушки и снаряда
            this.input.on('pointermove', function (pointer) {
                if (!isPaused) {
                    const angle = Phaser.Math.Angle.Between(frog.x, frog.y, pointer.x, pointer.y);
                    frog.rotation = angle + Math.PI / 2; 
                    
                    // Смещаем шарик к "рту" лягушки (45 пикселей от центра)
                    currentAmmo.x = frog.x + Math.cos(angle) * 45; 
                    currentAmmo.y = frog.y + Math.sin(angle) * 45;
                }
            }, this);

            this.input.on('pointerdown', function (pointer) {
                if (!isPaused && this.time.now > lastFired) {
                    shootBall(this, pointer);
                    lastFired = this.time.now + 300; 
                }
            }, this);

            this.input.keyboard.on('keydown-SPACE', showMathQuestion);
        }

        function update() {
            bullets.children.each(function(b) {
                if (b.active && (b.y < 0 || b.y > 600 || b.x < 0 || b.x > 800)) {
                    b.setActive(false);
                    b.setVisible(false);
                }
            });
        }

        function shootBall(scene, pointer) {
            let bullet = bullets.get();
            if (bullet) {
                bullet.setActive(true);
                bullet.setVisible(true);
                
                // Снаряд вылетает из того места, где находится currentAmmo
                bullet.setPosition(currentAmmo.x, currentAmmo.y);
                bullet.setDisplaySize(45, 45);
                
                scene.physics.moveTo(bullet, pointer.x, pointer.y, 500); 
            }
        }

        function showMathQuestion() {
            if (isPaused) return; 
            isPaused = true;
            game.scene.pause('default'); 

            const q = questions[Math.floor(Math.random() * questions.length)];
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                let btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (index === q.correct) alert("Правильно! Путь открыт.");
                    else alert("Ошибка! Будьте внимательнее.");
                    
                    document.getElementById('math-modal').style.display = 'none';
                    isPaused = false;
                    game.scene.resume('default');
                };
                container.appendChild(btn);
            });
            document.getElementById('math-modal').style.display = 'block';
        }
    </script>
</body>
</html>
