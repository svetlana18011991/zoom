<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор пути Wide: Шкатулка Зумы</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        /* Контейнер растянут на весь экран для центрирования холста */
        #game-container { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        const config = {
            type: Phaser.AUTO,
            scale: {
                // ENVELOP: покрывает экран, сохраняя пропорции! Никаких яиц!
                mode: Phaser.Scale.FIT, 
                autoCenter: Phaser.Scale.CENTER_BOTH,
                width: 1280, // МЫ ОБНОВИЛИ ЛОГИЧЕСКОЕ РАЗРЕШЕНИЕ ПОД 16:9
                height: 720
            },
            parent: 'game-container',
            scene: { preload: preload, create: create }
        };

        const game = new Phaser.Game(config);
        
        let customPathPoints = [];
        let graphics;

        function preload() {
            // Загружаем ваш новый WIDE фон 16:9
            this.load.image('background', 'bg.png');
        }

        function create() {
            // Размещаем фон и жестко задаем ему размер 1280x720
            this.add.image(640, 360, 'background').setDisplaySize(1280, 720);

            // Инструкция на экране
            this.add.text(10, 10, 'ИНСТРУМЕНТ СОЗДАТЕЛЯ (Wide Mode):\n1. Кликайте мышкой вдоль новой траншеи (от старта к финишу).\n2. Ставьте точки на каждом изгибе.\n3. Когда закончите, нажмите ENTER.', { 
                fontSize: '18px', 
                fill: '#00ff00', 
                backgroundColor: 'rgba(0,0,0,0.8)',
                padding: { x: 10, y: 10 }
            }).setDepth(100);

            graphics = this.add.graphics();

            // Обрабатываем клик мыши
            this.input.on('pointerdown', function (pointer) {
                // Запоминаем координату клика (округленную для четкости)
                customPathPoints.push(Math.round(pointer.x));
                customPathPoints.push(Math.round(pointer.y));
                
                // Перерисовываем линию
                drawPath();
            });

            // Обрабатываем нажатие Enter
            this.input.keyboard.on('keydown-ENTER', function () {
                if (customPathPoints.length < 4) {
                    alert("Поставьте хотя бы 2 точки!");
                    return;
                }
                
                // Превращаем массив в строку через запятую
                let codeStr = customPathPoints.join(', ');
                
                // Выводим системное окно, откуда легко скопировать текст
                prompt("СУПЕР! Вот ваши новые wide-screen координаты дорожки. Скопируйте их (Ctrl+C) и отправьте мне:", codeStr);
            });
        }

        function drawPath() {
            graphics.clear();
            
            // Рисуем красную линию траектории
            if (customPathPoints.length >= 4) {
                graphics.lineStyle(4, 0xff0000, 1);
                let path = new Phaser.Curves.Spline(customPathPoints);
                path.draw(graphics, 64);
            }
            
            // Рисуем желтые кружочки в местах ваших кликов
            graphics.fillStyle(0xffff00, 1);
            for(let i = 0; i < customPathPoints.length; i += 2) {
                graphics.fillCircle(customPathPoints[i], customPathPoints[i+1], 6);
            }
        }
    </script>
</body>
</html>
