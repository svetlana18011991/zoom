<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкатулка интерактивов: Зума</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: sans-serif;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        /* Стили для образовательного окна поверх игры */
        #math-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(250, 240, 220, 0.95);
            padding: 30px;
            border: 4px solid #b8860b;
            border-radius: 10px;
            text-align: center;
            width: 320px;
            z-index: 100;
        }
        .answer-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            background: #d4af37;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .answer-btn:hover { background: #b8860b; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="math-modal">
            <h2>Испытание Сфинкса</h2>
            <p id="question-text" style="font-size: 18px; font-weight: bold;"></p>
            <div id="answers-container"></div>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let frog;
        let bullets;
        let enemyBalls;
        let lastFired = 0;
        let isPaused = false; // Флаг для образовательной паузы

        // Математические задачи для проверки
        const questions = [
            { q: "Найдите корень уравнения: 2x + 8 = 20", options: ["x = 4", "x = 6", "x = 8"], correct: 1 },
            { q: "Вычислите: 7² - 19", options: ["30", "40", "50"], correct: 0 },
            { q: "Чему равна площадь квадрата со стороной 9?", options: ["18", "36", "81"], correct: 2 }
        ];

        function preload() {
            this.load.image('background', 'bg.png');
            this.load.image('frog', 'frog.png');
            this.load.image('ball', 'ball.png');
        }

        function create() {
            // 1. Добавляем фон
            this.add.image(400, 300, 'background').setDisplaySize(800, 600);

            // 2. Создаем траекторию для шариков (овал)
            let path = new Phaser.Curves.Ellipse(400, 300, 300, 200);

            // 3. Запускаем цепочку шариков по этой траектории
            enemyBalls = this.add.group();
            for (let i = 0; i < 15; i++) {
                let follower = this.add.follower(path, 0, 0, 'ball');
                
                // ИСПРАВЛЕНИЕ: Жестко задаем размер шарика 45х45 пикселей
                follower.setDisplaySize(45, 45); 
                
                enemyBalls.add(follower);
                
                follower.startFollow({
                    duration: 15000, // Скорость: 15 секунд на полный круг
                    positionOnPath: true,
                    repeat: -1,
                    yoyo: false,
                    startAt: i * 0.04 // Дистанция между шариками
                });
            }

            // 4. Добавляем группу для снарядов (шариков, которыми стреляем)
            bullets = this.physics.add.group({
                classType: Phaser.Physics.Arcade.Image,
                maxSize: 10,
                runChildUpdate: true
            });

            // 5. Добавляем лягушку в центр
            frog = this.add.image(400, 300, 'frog');
            // ИСПРАВЛЕНИЕ: Жестко задаем размер лягушки
            frog.setDisplaySize(120, 120); 

            // 6. Заставляем лягушку поворачиваться за мышкой
            this.input.on('pointermove', function (pointer) {
                if (!isPaused) {
                    const angle = Phaser.Math.Angle.Between(frog.x, frog.y, pointer.x, pointer.y);
                    frog.rotation = angle + Math.PI / 2; 
                }
            }, this);

            // 7. Выстрел по клику
            this.input.on('pointerdown', function (pointer) {
                if (!isPaused && this.time.now > lastFired) {
                    shootBall(this, pointer);
                    lastFired = this.time.now + 300; // Задержка между выстрелами
                }
            }, this);

            // Кнопка ПРОБЕЛ для вызова образовательной задачи
            this.input.keyboard.on('keydown-SPACE', showMathQuestion);
        }

        function update() {
            // Очистка улетевших за край экрана шариков-снарядов
            bullets.children.each(function(b) {
                if (b.active && (b.y < 0 || b.y > 600 || b.x < 0 || b.x > 800)) {
                    b.setActive(false);
                    b.setVisible(false);
                }
            });
        }

        function shootBall(scene, pointer) {
            let bullet = bullets.get();
            if (bullet) {
                bullet.setActive(true);
                bullet.setVisible(true);
                bullet.setPosition(frog.x, frog.y);
                
                // ИСПРАВЛЕНИЕ: Жестко задаем размер вылетающего шарика
                bullet.setDisplaySize(45, 45);
                
                // Летит в сторону клика
                scene.physics.moveTo(bullet, pointer.x, pointer.y, 500); 
            }
        }

        // --- Логика образовательного окна ---
        function showMathQuestion() {
            if (isPaused) return; 
            isPaused = true;
            
            // Ставим движок на паузу (шарики останавливаются)
            game.scene.pause('default'); 

            // Выбираем случайную задачу
            const q = questions[Math.floor(Math.random() * questions.length)];
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            
            // Генерируем кнопки с ответами
            q.options.forEach((opt, index) => {
                let btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (index === q.correct) {
                        alert("Правильно! Путь открыт.");
                    } else {
                        alert("Ошибка! Будьте внимательнее.");
                    }
                    // Убираем окно и снимаем игру с паузы
                    document.getElementById('math-modal').style.display = 'none';
                    isPaused = false;
                    game.scene.resume('default');
                };
                container.appendChild(btn);
            });

            // Показываем окно
            document.getElementById('math-modal').style.display = 'block';
        }
    </script>
</body>
</html>
