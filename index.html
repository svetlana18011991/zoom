<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зума: Шкатулка интерактивов</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: sans-serif;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        /* Стили для образовательного окна поверх игры */
        #math-modal {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(250, 240, 220, 0.95);
            padding: 30px;
            border: 4px solid #b8860b;
            border-radius: 10px;
            text-align: center;
            width: 320px;
            z-index: 100;
        }
        .answer-btn {
            display: block;
            width: 100%;
            margin: 10px 0;
            padding: 12px;
            background: #d4af37;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        .answer-btn:hover { background: #b8860b; color: white; }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="math-modal">
            <h2>Испытание Сфинкса</h2>
            <p id="question-text"></p>
            <div id="answers-container"></div>
        </div>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            parent: 'game-container',
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let frog;
        let bullets;
        let lastFired = 0;
        let isPaused = false; // Флаг для образовательной паузы

        // Математические задачи
        const questions = [
            { q: "Найдите корень уравнения: 2x + 8 = 20", options: ["x = 4", "x = 6", "x = 8"], correct: 1 },
            { q: "Вычислите: 7² - 19", options: ["30", "40", "50"], correct: 0 }
        ];

        function preload() {
            // ВАЖНО: Эти файлы должны лежать в вашем репозитории на GitHub!
            this.load.image('background', 'bg.jpg');
            this.load.image('frog', 'frog.png');
            this.load.image('ball', 'ball.png');
        }

        function create() {
            // 1. Добавляем фон
            this.add.image(400, 300, 'background').setDisplaySize(800, 600);

            // 2. Добавляем группу для летящих шариков (снарядов)
            bullets = this.physics.add.group({
                classType: Phaser.Physics.Arcade.Image,
                maxSize: 10,
                runChildUpdate: true
            });

            // 3. Добавляем лягушку в центр
            frog = this.add.image(400, 300, 'frog');
            frog.setScale(0.5); // Настройте масштаб под вашу картинку

            // 4. Заставляем лягушку поворачиваться за мышкой
            this.input.on('pointermove', function (pointer) {
                if (!isPaused) {
                    const angle = Phaser.Math.Angle.Between(frog.x, frog.y, pointer.x, pointer.y);
                    // Добавляем 90 градусов (Math.PI/2), если картинка лягушки смотрит вверх
                    frog.rotation = angle + Math.PI / 2; 
                }
            }, this);

            // 5. Выстрел по клику
            this.input.on('pointerdown', function (pointer) {
                if (!isPaused && this.time.now > lastFired) {
                    shootBall(this, pointer);
                    lastFired = this.time.now + 300; // Задержка между выстрелами
                }
            }, this);

            // Кнопка вызова задачи (для тестов можно нажать пробел)
            this.input.keyboard.on('keydown-SPACE', showMathQuestion);
        }

        function update() {
            // Очистка улетевших шариков
            bullets.children.each(function(b) {
                if (b.active && (b.y < 0 || b.y > 600 || b.x < 0 || b.x > 800)) {
                    b.setActive(false);
                    b.setVisible(false);
                }
            });
        }

        function shootBall(scene, pointer) {
            let bullet = bullets.get();
            if (bullet) {
                bullet.setActive(true);
                bullet.setVisible(true);
                // Шарик вылетает из центра (от лягушки)
                bullet.setPosition(frog.x, frog.y);
                
                // Летит в сторону клика
                scene.physics.moveTo(bullet, pointer.x, pointer.y, 400); // 400 - скорость
            }
        }

        // --- Логика образовательного окна ---
        function showMathQuestion() {
            isPaused = true;
            game.scene.pause('default'); // Ставим движок на паузу

            const q = questions[Math.floor(Math.random() * questions.length)];
            document.getElementById('question-text').innerText = q.q;
            
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                let btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (index === q.correct) {
                        alert("Правильно! Путь открыт.");
                    } else {
                        alert("Ошибка! Будьте внимательнее.");
                    }
                    document.getElementById('math-modal').style.display = 'none';
                    isPaused = false;
                    game.scene.resume('default');
                };
                container.appendChild(btn);
            });

            document.getElementById('math-modal').style.display = 'block';
        }
    </script>
</body>
</html>
